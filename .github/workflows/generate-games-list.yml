name: Generate Games List
on:
  push:
    paths:
      - 'Games/**'
      - 'iframe/**'
  workflow_dispatch:
jobs:
  generate-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan Games folder and generate games.json
        run: |
          echo "Scanning Games folder..."
          echo "[" > games.json
          first=true

          # Use find instead of glob — handles unlimited number of files
          while IFS= read -r entry; do
            if [ -f "$entry" ]; then
              gameName=$(basename "$entry" .html)
              iframeFile="iframe/${gameName}.html"

              if [ -f "$iframeFile" ]; then
                hasIframe="true"
              else
                hasIframe="false"
              fi

              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> games.json
              fi

              echo "  {" >> games.json
              echo "    \"name\": \"${gameName}\"," >> games.json
              echo "    \"path\": \"Games/${gameName}.html\"," >> games.json
              echo "    \"iframe\": \"iframe/${gameName}.html\"," >> games.json
              echo "    \"hasIframe\": ${hasIframe}" >> games.json
              echo -n "  }" >> games.json
            fi
          done < <(find Games -maxdepth 1 -name "*.html" -type f | sort)

          echo "" >> games.json
          echo "]" >> games.json

          echo "Done. Total games:"
          grep -c '"name"' games.json || echo "0"

      - name: Commit games.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add games.json
          if git diff --staged --quiet; then
            echo "No changes to games.json, skipping commit."
          else
            git commit -m "chore: update games.json [skip ci]"
            git push
          fi
